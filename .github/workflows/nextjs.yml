name: Deploy Next.js site to Pages

on:
  push:
    branches: ["gh-pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next
      - name: Install dependencies
        run: npm install --legacy-peer-deps --verbose
      - name: Debug project structure
        run: |
          echo "Project structure:"
          ls -la
          echo "Next.js config:"
          cat next.config.js
      - name: Build with Next.js
        run: npm run build --legacy-peer-deps
      - name: Debug output directory
        run: |
          echo "Output directory structure:"
          ls -la out || echo "No 'out' directory found"
          echo "Root content:"
          find . -maxdepth 1 -type f | sort
      - name: Fix routes for GitHub Pages
        run: |
          touch out/.nojekyll
          if [ -d "out/shop" ]; then
            echo "Copying contents from out/shop to out root"
            cp -r out/shop/* out/
            echo "After copying:"
            ls -la out
          else
            echo "No out/shop directory found, skipping copy"
          fi
          echo "Creating custom 404 page if needed"
          if [ ! -f "out/404.html" ]; then
            cp out/index.html out/404.html || echo "Could not create 404.html"
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 